name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libx11-6 libxext6 libxrender1 \
            libfontconfig1 libfreetype6 tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Unit tests
        run: python -m pytest tests/ -q -m "not integration"
        env:
          NOCTURNE_SKIP_INTEGRATION: "1"

      - name: Prefetch tiktoken (offline tokenizer)
        run: python scripts/prefetch_tiktoken.py

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean nocturne.spec

      - name: Package artifact
        run: python scripts/package_dist.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NocturneDataForge-${{ runner.os }}
          path: dist/NocturneDataForge-*.zip
          if-no-files-found: error
