[project]
name = "forestoptilm"
version = "1.0.0"
description = "Bulk async file processing through local LLMs (LM Studio)"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
authors = [
    { name = "therudywolf", url = "https://github.com/therudywolf" },
]
keywords = ["llm", "lm-studio", "map-reduce", "rag", "document-processing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: X11 Applications",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: General",
]

[project.urls]
Homepage = "https://github.com/therudywolf/ForestOptiLM"
Repository = "https://github.com/therudywolf/ForestOptiLM"
Issues = "https://github.com/therudywolf/ForestOptiLM/issues"
